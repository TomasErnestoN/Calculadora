name: CD-Hospedagem (GitHub Pages)

on:
  push:
    branches: [ "main" ] # Só roda quando o código chega na main (versão final)

permissions:
  contents: read
  pages: write      # Permissão para o robô escrever na área de site do GitHub
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Pages
        uses: actions/configure-pages@v4

      - name: 📦 Preparar artefato
        uses: actions/upload-pages-artifact@v3
        with:
        path: '.' # './public' PARA '.' # O robô só "sobe" o que está aqui dentro

      - name: 🚀 Colocar site no ar
        uses: actions/deploy-pages@v4