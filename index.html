<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f2f5;
    font-family: Arial;
}

/* calculadora */
#app {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

.inputs input {
    width: 80px;
    padding: 5px;
    margin: 5px;
}

.botoes button {
    margin: 3px;
    padding: 5px 10px;
    cursor: pointer;
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
}

/* testes */
#testes-container {
    position: fixed;
    right: 30px;
    top: 30px;
    width: 260px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

#testes-container h2 {
    text-align: center;
    margin-bottom: 10px;
}

.ok { color: green; }
.erro { color: red; }
.info { color: #555; font-size: 13px; }
</style>

</head>

<body>

<div id="app">

    <div class="inputs">
        <input type="number" placeholder="N1" id="n1">
        <input type="number" placeholder="N2" id="n2">
    </div>

    <div class="botoes">
        <button onclick="soma()">Soma</button>
        <button onclick="subtracao()">Subtração</button>
        <button onclick="multiplicacao()">Multiplicação</button>
        <button onclick="divisao()">Divisão</button>
        <button onclick="exponenciacao()">x²</button>
        <button onclick="raiz()">Raiz</button>
        <button onclick="fatorial()">x!</button>
    </div>

    <div id="resultado">Resultado: </div>

</div>

<!-- painel de testes -->
<div id="testes-container">
    <h2>Testes</h2>
    <div id="testes"></div>
</div>

<script type="module" src="ui.js"></script>
<script type="module" src="test_visual.js"></script>

</body>
</html>
